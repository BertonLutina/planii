services:
  api:
    build: .
    container_name: planii-api
    restart: unless-stopped
    env_file: .env
    networks:
      - dbnet
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=postgresql-5yar_default"
      - "traefik.http.routers.planii-api.entrypoints=websecure"
      - "traefik.http.routers.planii-api.rule=Host(`api.planii.app`)"
      - "traefik.http.routers.planii-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.planii-api.loadbalancer.server.port=4000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
networks:
  dbnet:
    external: true
    name: postgresql-5yar_default
